# PALIMPS — Netlify config
# Deploy: push to Git OR run `netlify deploy --prod --dir=.` from this folder.

[build]
  publish = "."

# Pretty URL for privacy: /privacy resolves to /privacy/index.html by default,
# so no redirect is needed. We include one fallback for /privacy.html just
# in case someone links that direct form.
[[redirects]]
  from = "/privacy.html"
  to = "/privacy/"
  status = 301
  force = true

# Canonical host (replace with apex once configured in Netlify DNS).
# Uncomment after pointing DNS.
# [[redirects]]
#   from = "https://www.palimps.app/*"
#   to = "https://palimps.app/:splat"
#   status = 301
#   force = true

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/privacy/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/kvkk-aydinlatma/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
