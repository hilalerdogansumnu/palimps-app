<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- PALIMPS app icon — master source, 1024×1024
       V1: Vibrant purple, serif P as book cover on top page.
       P is outlined (Libertine Semibold) — no font dependency.
       iOS applies the squircle mask; export as PNG with no alpha for App Store. -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7A5EE5"/>
      <stop offset="100%" stop-color="#5C3BCC"/>
    </linearGradient>
    <filter id="pageShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Back page -->
  <g transform="translate(512 523) rotate(-9)" filter="url(#pageShadow)">
    <rect x="-273" y="-341" width="546" height="683" rx="34" fill="#E4D9BF"/>
  </g>

  <!-- Middle page -->
  <g transform="translate(512 512) rotate(-2)" filter="url(#pageShadow)">
    <rect x="-273" y="-341" width="546" height="683" rx="34" fill="#F0E7D1"/>
  </g>

  <!-- Top page — book cover with serif P (outlined from Linux Libertine Semibold) -->
  <g transform="translate(512 500) rotate(5)" filter="url(#pageShadow)">
    <rect x="-273" y="-341" width="546" height="683" rx="34" fill="#FBF3DF"/>

    <!-- Serif P, outlined -->
    <g transform="translate(-172 158) scale(0.62 -0.62)">
      <path d="M221 558C221 593 228 613 281 613C339 613 406 589 406 467C406 363 353 319 271 319C256 319 235 320 221 322ZM99 89C99 51 84.69999694824219 39.80000305175781 44.0 34.0L30.0 32.0C26.100006103515625 31.399993896484375 22.0 29.0 22.0 23.0V0.0L24.0 -2.0C61.0 -1.0 122.0 0.0 160.0 0.0C198.0 0.0 269.0 -1.0 306.0 -2.0L308.0 0.0V23.0C308.0 29.0 306.0 31.399993896484375 300.0 32.0L281.0 34.0C241.1999969482422 38.19999694824219 221.0 51.0 221.0 89.0V282.0C235.0 280.0 252.0 279.0 276.0 279.0C473.0 279.0 533.0 388.0 533.0 484.0C533.0 548.0 490.0 654.0 289.0 654.0C208.0 654.0 83.0 647.0 24.0 647.0L22.0 645.0V621.0C22.0 617.0 25.0 613.0 33.0 613.0L65.0 611.0C87.0 610.0 99.0 595.0 99.0 560.0Z" fill="#4A2C9E"/>
    </g>

    <!-- Lavender fold corner, top right -->
    <path d="M 205 -341 L 273 -341 L 273 -273 Z" fill="#B39DDD"/>
  </g>
</svg>
